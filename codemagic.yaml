workflows:
  android-debug:
    name: Android Debug Workflow
    instance_type: mac_mini_m1
    scripts:
      - name: Build APK
        script: |
          # 1. Java 17'yi kesin olarak tanımlıyoruz
          export JAVA_HOME=$JAVA_HOME_17
          export PATH=$JAVA_HOME/bin:$PATH
          
          # 2. SDKMAN aracını hafızaya yükleyip aktif ediyoruz
          [[ -s "$HOME/.sdkman/bin/sdkman-init.sh" ]] && source "$HOME/.sdkman/bin/sdkman-init.sh"
          
          # 3. Gradle 9.3.1 sürümünü kurup sisteme ana motor olarak seçiyoruz
          sdk install gradle 9.3.1 < /dev/null
          sdk use gradle 9.3.1
          
          # 4. Senin klasörüne girip derlemeyi yerel gradle ile ateşliyoruz
          cd aykut
          gradle assembleDebug
    artifacts:
      - aykut/app/build/outputs/apk/debug/*.apk
