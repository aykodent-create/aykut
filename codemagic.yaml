workflows:
  android-debug:
    name: Android Debug Workflow
    # Burayı sistemin tam olarak izin verdiği 'linux' değerine çektik
    instance_type: linux
    max_build_duration: 30
    scripts:
      - name: Build APK
        script: |
          # Linux sunucusundaki Java 17 ortamını aktif ediyoruz
          export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
          export PATH=$JAVA_HOME/bin:$PATH
          
          # Doğrudan klasörüne girip derlemeyi başlatıyoruz
          cd aykut
          gradle assembleDebug
    artifacts:
      - aykut/app/build/outputs/apk/debug/*.apk
